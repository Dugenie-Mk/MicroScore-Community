server.port=8888
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/auth/**

spring.cloud.gateway.routes[1].id=admin-service
spring.cloud.gateway.routes[1].uri=lb://admin-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[2].id=loan-service
spring.cloud.gateway.routes[2].uri=lb://loan-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/prets/**,/api/parametres/**

spring.cloud.gateway.routes[3].id=scoring-service
spring.cloud.gateway.routes[3].uri=lb://scoring-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/scores/**

spring.cloud.gateway.routes[4].id=repayment-service
spring.cloud.gateway.routes[4].uri=lb://repayment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/remboursements/**

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=loan-service
springdoc.swagger-ui.urls[1].url=/loan-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=repayment-service
springdoc.swagger-ui.urls[2].url=/repayment-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=scoring-service
springdoc.swagger-ui.urls[3].url=/scoring-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=admin-service
springdoc.swagger-ui.urls[4].url=/admin-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=discovery-service
springdoc.swagger-ui.urls[5].url=/discovery-service/v3/api-docs

