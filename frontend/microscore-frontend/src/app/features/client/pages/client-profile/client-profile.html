<div class="space-y-5">
  <!-- Profile header -->
  <div class="rounded-2xl bg-gradient-to-br from-brand-600 to-brand-800 p-5 text-white sm:p-6">
    <div class="flex items-center gap-4">
      <span class="flex h-16 w-16 shrink-0 items-center justify-center rounded-full bg-white/20 text-xl font-bold backdrop-blur-sm">
        {{ getInitials() }}
      </span>
      <div>
        <h1 class="text-lg font-bold">{{ user()?.fullName }}</h1>
        <p class="text-sm text-white/70">{{ user()?.email }}</p>
        <span class="mt-1.5 inline-flex items-center rounded-full bg-white/15 px-2.5 py-0.5 text-xs font-semibold backdrop-blur-sm">
          Client
        </span>
      </div>
    </div>
  </div>

  <!-- Info card -->
  <div class="rounded-2xl bg-white p-5 shadow-sm dark:bg-gray-900 dark:ring-1 dark:ring-gray-800">
    <h2 class="mb-4 text-sm font-bold text-gray-900 dark:text-white">Informations</h2>
    <div class="space-y-3 text-sm">
      <div class="flex items-center justify-between border-b border-gray-100 pb-2 dark:border-gray-800">
        <span class="text-gray-500 dark:text-gray-400">Téléphone</span>
        <span class="font-medium text-gray-900 dark:text-white">{{ user()?.telephone || 'Non renseigné' }}</span>
      </div>
      <div class="flex items-center justify-between border-b border-gray-100 pb-2 dark:border-gray-800">
        <span class="text-gray-500 dark:text-gray-400">CNI</span>
        <span class="font-medium text-gray-900 dark:text-white">{{ user()?.cni || 'Non renseigné' }}</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-gray-500 dark:text-gray-400">Membre depuis</span>
        <span class="font-medium text-gray-900 dark:text-white">Janvier 2026</span>
      </div>
    </div>
  </div>

  <!-- Stats bars -->
  <div class="rounded-2xl bg-white p-5 shadow-sm dark:bg-gray-900 dark:ring-1 dark:ring-gray-800">
    <h2 class="mb-4 text-sm font-bold text-gray-900 dark:text-white">Statistiques</h2>
    <div class="space-y-4">
      <div>
        <div class="flex justify-between text-sm mb-1.5">
          <span class="text-gray-500 dark:text-gray-400">Score de crédit</span>
          <span class="font-bold text-brand-600 dark:text-brand-400">81%</span>
        </div>
        <div class="h-2.5 rounded-full bg-gray-100 dark:bg-gray-800">
          <div class="h-2.5 rounded-full bg-gradient-to-r from-brand-500 to-brand-400" style="width: 81%"></div>
        </div>
      </div>
      <div>
        <div class="flex justify-between text-sm mb-1.5">
          <span class="text-gray-500 dark:text-gray-400">Prêts remboursés</span>
          <span class="font-bold text-green-600 dark:text-green-400">1/1</span>
        </div>
        <div class="h-2.5 rounded-full bg-gray-100 dark:bg-gray-800">
          <div class="h-2.5 rounded-full bg-gradient-to-r from-green-500 to-green-400" style="width: 100%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Logout -->
  <button (click)="logout()" class="flex w-full items-center justify-center gap-2 rounded-xl border border-red-200 bg-white px-5 py-3 text-sm font-semibold text-red-600 shadow-sm transition hover:bg-red-50 active:scale-[0.98] dark:border-red-900/30 dark:bg-gray-900 dark:text-red-400 dark:hover:bg-red-500/10">
    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.7" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
    </svg>
    Se déconnecter
  </button>
</div>
